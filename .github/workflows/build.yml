name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            exe: mioc
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.5/clang+llvm-20.1.5-x86_64-linux-gnu-ubuntu-24.04.tar.xz
            llvm_dir: clang+llvm-20.1.5-x86_64-linux-gnu-ubuntu-24.04
          - os: ubuntu-24.04-arm
            name: linux-arm64
            exe: mioc
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.5/clang+llvm-20.1.5-aarch64-linux-gnu.tar.xz
            llvm_dir: clang+llvm-20.1.5-aarch64-linux-gnu
          - os: macos-13
            name: macos-x86_64
            exe: mioc
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.5/clang+llvm-20.1.5-x86_64-apple-darwin.tar.xz
            llvm_dir: clang+llvm-20.1.5-x86_64-apple-darwin
          - os: macos-latest
            name: macos-arm64
            exe: mioc
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.5/clang+llvm-20.1.5-arm64-apple-darwin.tar.xz
            llvm_dir: clang+llvm-20.1.5-arm64-apple-darwin
          - os: windows-latest
            name: windows-x86_64
            exe: mioc.exe
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.5/clang+llvm-20.1.5-x86_64-pc-windows-msvc.tar.xz
            llvm_dir: clang+llvm-20.1.5-x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download LLVM
        shell: bash
        run: |
          curl -L -o llvm.tar.xz "${{ matrix.llvm_url }}"
          tar -xf llvm.tar.xz
          echo "LLVM_DIR=$GITHUB_WORKSPACE/${{ matrix.llvm_dir }}" >> $GITHUB_ENV

      # ---------- Build mioc (Linux/macOS) ----------
      - name: Build mioc (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd src
          bash build.sh
          chmod +x mioc
          ./mioc --version

      # ---------- Build mioc (Windows) ----------
      - name: Build mioc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:LLVM_DIR = "$env:GITHUB_WORKSPACE\${{ matrix.llvm_dir }}"
          cd src
          .\build.ps1
          .\mioc.exe --version

      # ---------- Upload artifact ----------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: src/${{ matrix.exe }}

  # ============================================================
  # Deploy: collect all binaries, push to "build" branch
  # ============================================================
  deploy:
    name: Deploy to build branch
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Push to build branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git rev-parse --verify build >/dev/null 2>&1; then
            git checkout build
            rm -rf *
          else
            git checkout --orphan build
            git rm -rf . 2>/dev/null || true
          fi

          mkdir -p build
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/mioc" ] || [ -f "$dir/mioc.exe" ]; then
              cp "$dir"/* build/
              mv build/mioc "build/mioc-${name}" 2>/dev/null || true
              mv build/mioc.exe "build/mioc-${name}.exe" 2>/dev/null || true
            fi
          done

          git add build/
          git commit -m "Build ${GITHUB_SHA:0:7} [skip ci]" || echo "Nothing to commit"
          git push -f origin build