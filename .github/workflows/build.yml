name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            exe: mioc
          - os: ubuntu-24.04-arm
            name: linux-arm64
            exe: mioc
          - os: macos-13
            name: macos-x86_64
            exe: mioc
          - os: macos-latest
            name: macos-arm64
            exe: mioc
          - os: windows-latest
            name: windows-x86_64
            exe: mioc.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================================
      # Linux: install LLVM + LLD via official APT repo
      # ============================================================
      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/os-release
          sudo add-apt-repository -y "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main"
          sudo apt-get update
          sudo apt-get install -y llvm-21 llvm-21-dev clang-21 lld-21 \
            liblld-21-dev libzstd-dev
          # Debug: what Polly packages are available?
          echo "=== Searching for Polly packages ==="
          apt-cache search polly 2>/dev/null | grep -i "21\|llvm" || echo "(none found)"
          echo "=== LLVM lib dir contents (Polly) ==="
          ls -la /usr/lib/llvm-21/lib/lib*Polly* /usr/lib/llvm-21/lib/lib*polly* 2>/dev/null || echo "(no Polly libs)"
          # Try to install Polly
          sudo apt-get install -y libpolly-21-dev 2>&1 || echo "libpolly-21-dev failed"
          echo "=== After install attempt ==="
          ls -la /usr/lib/llvm-21/lib/lib*Polly* /usr/lib/llvm-21/lib/lib*polly* 2>/dev/null || echo "(still no Polly libs)"
          # If liblld-21-dev doesn't exist, try lld-21-dev
          if [ ! -f /usr/lib/llvm-21/include/lld/Common/Driver.h ]; then
            sudo apt-get install -y lld-21-dev 2>/dev/null || true
          fi
          # If still missing, copy headers manually from lld-21 package
          if [ ! -f /usr/lib/llvm-21/include/lld/Common/Driver.h ]; then
            echo "Downloading LLD headers..."
            sudo mkdir -p /usr/lib/llvm-21/include/lld/Common
            sudo curl -sL -o /usr/lib/llvm-21/include/lld/Common/Driver.h \
              https://raw.githubusercontent.com/llvm/llvm-project/llvmorg-21.1.0/lld/include/lld/Common/Driver.h
            sudo mkdir -p /usr/lib/llvm-21/include/lld/Common
            sudo curl -sL -o /usr/lib/llvm-21/include/lld/Common/Version.inc \
              https://raw.githubusercontent.com/llvm/llvm-project/llvmorg-21.1.0/lld/include/lld/Common/Version.inc
          fi

      - name: Set LLVM_DIR (Linux)
        if: runner.os == 'Linux'
        run: echo "LLVM_DIR=/usr/lib/llvm-21" >> $GITHUB_ENV

      # ============================================================
      # macOS: install LLVM + LLD via Homebrew
      # ============================================================
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm lld zstd
          LLVM_PREFIX=$(brew --prefix llvm)
          LLD_PREFIX=$(brew --prefix lld)
          echo "LLVM_PREFIX=$LLVM_PREFIX"
          echo "LLD_PREFIX=$LLD_PREFIX"
          # Symlink LLD headers into LLVM prefix
          ln -sf "$LLD_PREFIX/include/lld" "$LLVM_PREFIX/include/lld"
          # Symlink LLD libraries (.a and .dylib)
          echo "LLD lib contents:"
          ls -la "$LLD_PREFIX/lib/" || true
          FOUND=0
          for lib in "$LLD_PREFIX/lib/"liblld*.a "$LLD_PREFIX/lib/"liblld*.dylib; do
            if [ -f "$lib" ]; then
              echo "  symlink $lib -> $LLVM_PREFIX/lib/$(basename "$lib")"
              ln -sf "$lib" "$LLVM_PREFIX/lib/$(basename "$lib")"
              FOUND=1
            fi
          done
          if [ "$FOUND" = "0" ]; then
            echo "brew lld has no static libs, downloading LLVM+LLD bundle..."
            if [ "$(uname -m)" = "arm64" ]; then
              ARCH="arm64"
            else
              ARCH="x86_64"
            fi
            URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.0/clang+llvm-21.1.0-${ARCH}-apple-darwin.tar.xz"
            echo "Downloading $URL"
            curl -sL "$URL" -o /tmp/llvm.tar.xz
            sudo tar xJf /tmp/llvm.tar.xz -C /tmp --strip-components=1
            # Copy LLD headers+libs into brew LLVM prefix
            sudo cp -r /tmp/include/lld "$LLVM_PREFIX/include/lld"
            sudo cp /tmp/lib/liblld*.a "$LLVM_PREFIX/lib/"
            rm -f /tmp/llvm.tar.xz
          fi
          echo "LLVM lib after symlink:"
          ls "$LLVM_PREFIX/lib/"liblld* 2>/dev/null || echo "  (no lld libs found)"

      - name: Set LLVM_DIR (macOS)
        if: runner.os == 'macOS'
        run: echo "LLVM_DIR=$(brew --prefix llvm)" >> $GITHUB_ENV

      # ============================================================
      # Windows: install LLVM via chocolatey (fast, local mirror)
      # ============================================================
      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm -y --no-progress --limit-output
          # Find where Chocolatey installed LLVM
          refreshenv
          $clang = (Get-Command clang++.exe -ErrorAction SilentlyContinue).Source
          if ($clang) {
            $llvmDir = Split-Path -Parent (Split-Path -Parent $clang)
            Write-Host "Found LLVM at: $llvmDir"
          } else {
            $llvmDir = "C:\Program Files\LLVM"
            Write-Host "Fallback LLVM: $llvmDir"
          }
          Write-Host "Include exists: $(Test-Path "$llvmDir\include\llvm\IR\IRBuilder.h")"
          Get-ChildItem "$llvmDir" -Directory | Select-Object Name
          echo "LLVM_DIR=$llvmDir" >> $env:GITHUB_ENV

      # ============================================================
      # Build mioc
      # ============================================================
      - name: Build mioc (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd src
          bash build.sh
          chmod +x mioc
          ./mioc --version

      - name: Build mioc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd src
          .\build.ps1
          .\mioc.exe --version

      # ============================================================
      # Upload
      # ============================================================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: src/${{ matrix.exe }}

  # ============================================================
  # Deploy: collect all binaries, push to "build" branch
  # ============================================================
  deploy:
    name: Deploy to build branch
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Push to build branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git rev-parse --verify build >/dev/null 2>&1; then
            git checkout build
            rm -rf *
          else
            git checkout --orphan build
            git rm -rf . 2>/dev/null || true
          fi

          mkdir -p build
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/mioc" ]; then
              cp "$dir/mioc" "build/mioc-${name}"
            elif [ -f "$dir/mioc.exe" ]; then
              cp "$dir/mioc.exe" "build/mioc-${name}.exe"
            fi
          done

          ls -la build/
          git add build/
          git commit -m "Build ${GITHUB_SHA:0:7} [skip ci]" || echo "Nothing to commit"
          git push -f origin build