name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            exe: mioc
          - os: ubuntu-24.04-arm
            name: linux-arm64
            exe: mioc
          - os: macos-13
            name: macos-x86_64
            exe: mioc
          - os: macos-latest
            name: macos-arm64
            exe: mioc
          - os: windows-latest
            name: windows-x86_64
            exe: mioc.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================================
      # Linux: install LLVM via official APT repo
      # ============================================================
      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/os-release
          sudo add-apt-repository -y "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main"
          sudo apt-get update
          sudo apt-get install -y llvm-21-dev clang-21 lld-21

      - name: Set LLVM_DIR (Linux)
        if: runner.os == 'Linux'
        run: echo "LLVM_DIR=/usr/lib/llvm-21" >> $GITHUB_ENV

      # ============================================================
      # macOS: install LLVM via Homebrew
      # ============================================================
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Set LLVM_DIR (macOS)
        if: runner.os == 'macOS'
        run: echo "LLVM_DIR=$(brew --prefix llvm)" >> $GITHUB_ENV

      # ============================================================
      # Windows: download LLVM prebuilt binaries from GitHub
      # ============================================================
      - name: Download LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.0/clang+llvm-21.1.8-x86_64-pc-windows-msvc.tar.xz"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile llvm.tar.xz
          7z x llvm.tar.xz -y
          7z x llvm.tar -y -ollvm
          Remove-Item llvm.tar.xz, llvm.tar -Force
          $dir = Get-ChildItem -Directory llvm\ | Select-Object -First 1
          echo "LLVM_DIR=$env:GITHUB_WORKSPACE\llvm\$dir" >> $env:GITHUB_ENV

      # ============================================================
      # Build mioc
      # ============================================================
      - name: Build mioc (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd src
          bash build.sh
          chmod +x mioc
          ./mioc --version

      - name: Build mioc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd src
          .\build.ps1
          .\mioc.exe --version

      # ============================================================
      # Upload
      # ============================================================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: src/${{ matrix.exe }}

  # ============================================================
  # Deploy: collect all binaries, push to "build" branch
  # ============================================================
  deploy:
    name: Deploy to build branch
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Push to build branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git rev-parse --verify build >/dev/null 2>&1; then
            git checkout build
            rm -rf *
          else
            git checkout --orphan build
            git rm -rf . 2>/dev/null || true
          fi

          mkdir -p build
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/mioc" ]; then
              cp "$dir/mioc" "build/mioc-${name}"
            elif [ -f "$dir/mioc.exe" ]; then
              cp "$dir/mioc.exe" "build/mioc-${name}.exe"
            fi
          done

          ls -la build/
          git add build/
          git commit -m "Build ${GITHUB_SHA:0:7} [skip ci]" || echo "Nothing to commit"
          git push -f origin build