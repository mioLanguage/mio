name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0, latest)'
        required: true
        default: 'latest'
      title:
        description: 'Release title'
        required: false
        default: 'Latest Build'
      notes:
        description: 'Release notes'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release (beta)'
        type: boolean
        required: false
        default: false

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64
            exe: mioc
          - os: ubuntu-22.04-arm
            name: linux-arm64
            exe: mioc
          - os: macos-latest
            name: macos-arm64
            exe: mioc
          - os: windows-latest
            name: windows-x86_64
            exe: mioc.exe
          - os: windows-11-arm
            name: windows-arm64
            exe: mioc.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================================
      # Linux: download pre-built LLVM 22.1.8
      # ============================================================
      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          ARCH=$(uname -m)
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.8/clang+llvm-22.1.8-${ARCH}-linux-gnu-ubuntu-24.04.tar.xz"
          echo "Downloading $URL"
          curl -sL "$URL" -o /tmp/llvm.tar.xz
          sudo mkdir -p /usr/lib/llvm-22
          sudo tar xJf /tmp/llvm.tar.xz -C /usr/lib/llvm-22 --strip-components=1
          rm -f /tmp/llvm.tar.xz
          ls /usr/lib/llvm-22/bin/

      - name: Set LLVM_DIR (Linux)
        if: runner.os == 'Linux'
        run: echo "LLVM_DIR=/usr/lib/llvm-22" >> $GITHUB_ENV

      # ============================================================
      # macOS: install LLVM + LLD via Homebrew
      # ============================================================
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm lld zstd
          LLVM_PREFIX=$(brew --prefix llvm)
          LLD_PREFIX=$(brew --prefix lld)
          echo "LLVM_PREFIX=$LLVM_PREFIX"
          echo "LLD_PREFIX=$LLD_PREFIX"
          # Symlink LLD headers into LLVM prefix
          ln -sf "$LLD_PREFIX/include/lld" "$LLVM_PREFIX/include/lld"
          # Symlink LLD libraries (.a and .dylib)
          echo "LLD lib contents:"
          ls -la "$LLD_PREFIX/lib/" || true
          FOUND=0
          for lib in "$LLD_PREFIX/lib/"liblld*.a "$LLD_PREFIX/lib/"liblld*.dylib; do
            if [ -f "$lib" ]; then
              echo "  symlink $lib -> $LLVM_PREFIX/lib/$(basename "$lib")"
              ln -sf "$lib" "$LLVM_PREFIX/lib/$(basename "$lib")"
              FOUND=1
            fi
          done
          if [ "$FOUND" = "0" ]; then
            echo "brew lld has no static libs, downloading LLVM+LLD bundle..."
            if [ "$(uname -m)" = "arm64" ]; then
              ARCH="arm64"
            else
              ARCH="x86_64"
            fi
            URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.8/clang+llvm-22.1.8-${ARCH}-apple-darwin.tar.xz"
            echo "Downloading $URL"
            curl -sL "$URL" -o /tmp/llvm.tar.xz
            sudo tar xJf /tmp/llvm.tar.xz -C /tmp --strip-components=1
            # Copy LLD headers+libs into brew LLVM prefix
            sudo cp -r /tmp/include/lld "$LLVM_PREFIX/include/lld"
            sudo cp /tmp/lib/liblld*.a "$LLVM_PREFIX/lib/"
            rm -f /tmp/llvm.tar.xz
          fi
          echo "LLVM lib after symlink:"
          ls "$LLVM_PREFIX/lib/"liblld* 2>/dev/null || echo "  (no lld libs found)"

      - name: Set LLVM_DIR (macOS)
        if: runner.os == 'macOS'
        run: echo "LLVM_DIR=$(brew --prefix llvm)" >> $GITHUB_ENV

      # ============================================================
      # Windows: download pre-built LLVM
      # ============================================================
      - name: Download LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $arch = if ($env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'arm64' } else { 'x86_64' }
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.8/clang+llvm-22.1.8-${arch}-pc-windows-msvc.tar.xz"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile C:\llvm.tar.xz
          Write-Host "Extracting..."
          tar xf C:\llvm.tar.xz -C C:\
          Rename-Item "C:\clang+llvm-22.1.8-${arch}-pc-windows-msvc" C:\llvm
          Remove-Item C:\llvm.tar.xz
          Write-Host "LLVM installed to C:\llvm"

      - name: Set LLVM_DIR (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "LLVM_DIR=C:\llvm" >> $env:GITHUB_ENV

      # ============================================================
      # Build mioc
      # ============================================================
      - name: Build mioc (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd src
          bash build.sh
          chmod +x mioc
          ./mioc --version

      - name: Build mioc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd src
          .\build.ps1
          .\mioc.exe --version

      # ============================================================
      # Upload
      # ============================================================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            src/${{ matrix.exe }}

  # ============================================================
  # Release: collect all binaries, publish to GitHub Releases
  # ============================================================
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename and collect
        run: |
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/mioc" ]; then
              cp "$dir/mioc" "mioc-${name}"
            elif [ -f "$dir/mioc.exe" ]; then
              cp "$dir/mioc.exe" "mioc-${name}.exe"
              zip "mioc-${name}.zip" "mioc-${name}.exe"
              rm -f "mioc-${name}.exe"
            fi
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.title }}
          body: ${{ github.event.inputs.notes }}
          files: |
            mioc-*
          prerelease: ${{ github.event.inputs.prerelease }}
          make_latest: true