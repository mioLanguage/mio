name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0, latest)'
        required: true
        default: 'latest'
      title:
        description: 'Release title'
        required: false
        default: 'Latest Build'
      notes:
        description: 'Release notes'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release (beta)'
        type: boolean
        required: false
        default: false

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64
            exe: mioc
          - os: ubuntu-22.04-arm
            name: linux-arm64
            exe: mioc
          - os: macos-latest
            name: macos-arm64
            exe: mioc
          - os: windows-latest
            name: windows-x86_64
            exe: mioc.exe
            llvm_ver: 22.1.8
            llvm_arch: x86_64
          - os: windows-11-arm
            name: windows-arm64
            exe: mioc.exe
            llvm_ver: 22.1.8
            llvm_arch: aarch64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================================
      # Linux: install LLVM + LLD via official APT repo
      # ============================================================
      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/os-release
          sudo add-apt-repository -y "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main"
          sudo apt-get update
          sudo apt-get install -y llvm-21 llvm-21-dev clang-21 lld-21 \
            liblld-21-dev libpolly-21-dev libzstd-dev
          if [ ! -f /usr/lib/llvm-21/include/lld/Common/Driver.h ]; then
            sudo apt-get install -y lld-21-dev 2>/dev/null || true
          fi
          if [ ! -f /usr/lib/llvm-21/include/lld/Common/Driver.h ]; then
            echo "Downloading LLD headers..."
            sudo mkdir -p /usr/lib/llvm-21/include/lld/Common
            sudo curl -sL -o /usr/lib/llvm-21/include/lld/Common/Driver.h \
              https://raw.githubusercontent.com/llvm/llvm-project/llvmorg-21.1.0/lld/include/lld/Common/Driver.h
            sudo curl -sL -o /usr/lib/llvm-21/include/lld/Common/Version.inc \
              https://raw.githubusercontent.com/llvm/llvm-project/llvmorg-21.1.0/lld/include/lld/Common/Version.inc
          fi

      - name: Set LLVM_DIR (Linux)
        if: runner.os == 'Linux'
        run: echo "LLVM_DIR=/usr/lib/llvm-21" >> $GITHUB_ENV

      # ============================================================
      # macOS: install LLVM + LLD via Homebrew
      # ============================================================
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm lld zstd
          LLVM_PREFIX=$(brew --prefix llvm)
          LLD_PREFIX=$(brew --prefix lld)
          echo "LLVM_PREFIX=$LLVM_PREFIX"
          echo "LLD_PREFIX=$LLD_PREFIX"
          # Symlink LLD headers into LLVM prefix
          ln -sf "$LLD_PREFIX/include/lld" "$LLVM_PREFIX/include/lld"
          # Symlink LLD libraries (.a and .dylib)
          echo "LLD lib contents:"
          ls -la "$LLD_PREFIX/lib/" || true
          FOUND=0
          for lib in "$LLD_PREFIX/lib/"liblld*.a "$LLD_PREFIX/lib/"liblld*.dylib; do
            if [ -f "$lib" ]; then
              echo "  symlink $lib -> $LLVM_PREFIX/lib/$(basename "$lib")"
              ln -sf "$lib" "$LLVM_PREFIX/lib/$(basename "$lib")"
              FOUND=1
            fi
          done
          if [ "$FOUND" = "0" ]; then
            echo "brew lld has no static libs, downloading LLVM+LLD bundle..."
            if [ "$(uname -m)" = "arm64" ]; then
              ARCH="arm64"
            else
              ARCH="x86_64"
            fi
            URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.8/clang+llvm-22.1.8-${ARCH}-apple-darwin.tar.xz"
            echo "Downloading $URL"
            curl -sL "$URL" -o /tmp/llvm.tar.xz
            sudo tar xJf /tmp/llvm.tar.xz -C /tmp --strip-components=1
            # Copy LLD headers+libs into brew LLVM prefix
            sudo cp -r /tmp/include/lld "$LLVM_PREFIX/include/lld"
            sudo cp /tmp/lib/liblld*.a "$LLVM_PREFIX/lib/"
            rm -f /tmp/llvm.tar.xz
          fi
          echo "LLVM lib after symlink:"
          ls "$LLVM_PREFIX/lib/"liblld* 2>/dev/null || echo "  (no lld libs found)"

      - name: Set LLVM_DIR (macOS)
        if: runner.os == 'macOS'
        run: echo "LLVM_DIR=$(brew --prefix llvm)" >> $GITHUB_ENV

      # ============================================================
      # Windows: download pre-built LLVM
      # ============================================================
      - name: Download LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $arch = '${{ matrix.llvm_arch }}'
          $ver = '${{ matrix.llvm_ver }}'
          if ($arch -eq 'aarch64') {
            $tar_url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${ver}/clang+llvm-${ver}-${arch}-pc-windows-msvc.tar.xz"
            $exe_url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${ver}/LLVM-${ver}-woa64.exe"
            Write-Host "Downloading headers from $tar_url"
            Invoke-WebRequest -Uri $tar_url -OutFile C:\llvm-hdr.tar.xz
            $topdir = (tar tf C:\llvm-hdr.tar.xz | Select-Object -First 1).Split('/')[0]
            Write-Host "Extracting include dir from tar.xz..."
            New-Item -ItemType Directory -Path C:\temp_hdr -Force | Out-Null
            tar xf C:\llvm-hdr.tar.xz -C C:\temp_hdr "$topdir/include/"
            Write-Host "Downloading installer from $exe_url"
            Invoke-WebRequest -Uri $exe_url -OutFile C:\llvm-installer.exe
            Write-Host "Installing (this may take a few minutes)..."
            Start-Process -Wait -FilePath C:\llvm-installer.exe -ArgumentList '/S','/D=C:\llvm'
            Write-Host "Copying headers from tar.xz to C:\llvm\include..."
            Copy-Item "C:\temp_hdr\$topdir\include\*" C:\llvm\include\ -Recurse -Force
            Remove-Item -Force -ErrorAction SilentlyContinue C:\llvm-hdr.tar.xz, C:\llvm-installer.exe
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue C:\temp_hdr
          } else {
            $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${ver}/clang+llvm-${ver}-${arch}-pc-windows-msvc.tar.xz"
            Write-Host "Downloading $url"
            Invoke-WebRequest -Uri $url -OutFile C:\llvm.tar.xz
            Write-Host "Extracting..."
            tar xf C:\llvm.tar.xz -C C:\
            Rename-Item "C:\clang+llvm-${ver}-${arch}-pc-windows-msvc" C:\llvm
            Remove-Item C:\llvm.tar.xz
          }
          Write-Host "LLVM installed to C:\llvm"
          Write-Host "Checking installation..."
          if (Test-Path C:\llvm\bin\clang++.exe) {
            Write-Host "  clang++.exe found"
          } else {
            Write-Host "  WARNING: clang++.exe not found at C:\llvm\bin\clang++.exe"
            Get-ChildItem C:\llvm -Recurse -Name -ErrorAction SilentlyContinue | Select-Object -First 30
          }
          Write-Host "Listing C:\llvm\lib\*.lib:"
          Get-ChildItem C:\llvm\lib\*.lib -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.Name)  $($_.Length) bytes"
          }
          if (-not (Get-ChildItem C:\llvm\lib\*.lib -ErrorAction SilentlyContinue)) {
            Write-Host "  (no .lib files found in C:\llvm\lib)"
            Write-Host "Searching for .lib files anywhere under C:\llvm..."
            Get-ChildItem C:\llvm -Recurse -Filter "*.lib" -ErrorAction SilentlyContinue |
              Select-Object -First 20 |
              ForEach-Object { Write-Host "  $($_.FullName)" }
          }

      - name: Set LLVM_DIR (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "LLVM_DIR=C:\llvm" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "LLVM_DIR set to C:\llvm"

      # ============================================================
      # Build mioc
      # ============================================================
      - name: Build mioc (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd src
          bash build.sh
          chmod +x ../bin/mioc
          ../bin/mioc --version

      - name: Build mioc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd src
          .\build.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ..\bin\mioc.exe --version

      # ============================================================
      # Upload
      # ============================================================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            bin/${{ matrix.exe }}
            include/

  # ============================================================
  # Release: collect all binaries, publish to GitHub Releases
  # ============================================================
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename and collect
        run: |
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/bin/mioc" ]; then
              mkdir -p "mioc-${name}/bin"
              cp "$dir/bin/mioc" "mioc-${name}/bin/mioc"
              if [ -d "$dir/include" ]; then
                cp -r "$dir/include" "mioc-${name}/"
              fi
              (cd "mioc-${name}" && zip -r "../mioc-${name}.zip" .)
              rm -rf "mioc-${name}"
            elif [ -f "$dir/bin/mioc.exe" ]; then
              mkdir -p "mioc-${name}/bin"
              cp "$dir/bin/mioc.exe" "mioc-${name}/bin/mioc.exe"
              if [ -d "$dir/include" ]; then
                cp -r "$dir/include" "mioc-${name}/"
              fi
              (cd "mioc-${name}" && zip -r "../mioc-${name}.zip" .)
              rm -rf "mioc-${name}"
            fi
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.title }}
          body: ${{ github.event.inputs.notes }}
          files: |
            mioc-*
          prerelease: ${{ github.event.inputs.prerelease }}
          make_latest: true